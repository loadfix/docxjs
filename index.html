<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
    <!--dependencies-->
    <script crossorigin src="https://unpkg.com/jszip/dist/jszip.min.js"></script>
    <!--library-->
    <script src="dist/docx-preview.js"></script>
    <script crossorigin src="https://unpkg.com/tiff.js@1.0.0/tiff.min.js"></script>
    <script crossorigin src="https://unpkg.com/rtf.js@3.0.9/dist/WMFJS.bundle.js"></script>
    <script src="./demo/docx-preprocessor.js"></script>

    <style>
        @media print {
            .no-print {
                display: none;
            }

            .overflow-auto {
                overflow: initial !important;
            }
        }

        /* Demo-side thumbnail drawer chrome. Per-thumbnail styles ship
           with docx.renderThumbnails. */
        details.docx-thumbnails {
            position: relative;
            background-color: rgb(101, 101, 101);
            border-right: 1px solid black;
            min-width: 1rem;
        }
        details.docx-thumbnails[open] {
            min-width: 140px;
        }
        details.docx-thumbnails summary {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            width: 1rem;
            padding-left: 3px;
        }
        details.docx-thumbnails summary:hover {
            background-color: rgb(0 0 0 / 50%);
        }
        details.docx-thumbnails summary::marker {
            color: white;
        }
        .docx-thumbnails-container {
            height: 100%;
            overflow: auto;
            scrollbar-gutter: stable both-edges;
            padding: 0.25rem 0.25rem 0.25rem 1.25rem;
        }
    </style>
</head>

<body class="vh-100 d-flex flex-column">
    <div class="hstack p-2 gap-2 bg-light no-print">

        <input id="files" type="file" class="form-control" style="width: 50ch;" accept=".docx" />
        <button id="loadButton" class="btn btn-primary px-4">Reload</button>
        <div class="dropdown">
            <button class="btn btn-secondary dropdown-toggle" type="button" id="optionsMenuButton"
                data-bs-toggle="dropdown" aria-expanded="false">
                Options
            </button>
            <ul id="optionsMenu" class="dropdown-menu" aria-labelledby="optionsMenuButton">
            </ul>
        </div>
    </div>

    <div class="flex-grow-1 d-flex flex-row" style="height: 0;">
        <details class="docx-thumbnails h-100 no-print">
            <summary></summary>
            <div id="thumbnails-container" class="docx-thumbnails-container"></div>
        </details>
        <div id="document-container" class="overflow-auto flex-grow-1 h-100"></div>
    </div>

    <script>
        let currentDocument = null;
        const docxOptions = Object.assign(docx.defaultOptions, {
            debug: true,
            experimental: true,
            hideWrapperOnPrint: true,
            // Demo-side default: show the new visual pagination by default so
            // reviewers see the fixed behaviour out of the box. The library
            // default stays `false` for back-compat. See #22.
            experimentalPageBreaks: true,
        });

        const container = document.querySelector("#document-container");
        const fileInput = document.querySelector("#files");
        const loadButton = document.querySelector("#loadButton");

        async function renderDocx(file) {
            currentDocument = file; 

            if (!currentDocument) 
                return;
            
            // optional, find and convert all tiff images 
            let docxBlob = await preprocessDocx(currentDocument); 
            // render document
            let res = await docx.renderAsync(docxBlob, container, null, docxOptions)
            // optional - render thumbnails
            docx.renderThumbnails(container, document.querySelector("#thumbnails-container"));
            console.log(res);
        }
        
        fileInput.addEventListener("change", ev => renderDocx(fileInput.files[0]));
        loadButton.addEventListener("click", ev => renderDocx(fileInput.files[0]));

        const menu = document.querySelector("#optionsMenu");

        function addToggle(label, getter, setter) {
            const listItem = document.createElement("li");
            listItem.innerHTML = `
            <div class="dropdown-item">
                <div class="form-check">
                    <label class="form-check-name"><input type="checkbox" class="form-check-input" ${getter() ? 'checked' : ''}> ${label}</label>
                </div>
            </div>`;

            const checkInput = listItem.querySelector("input");
            checkInput.addEventListener("click", () => {
                setter(checkInput.checked);
                renderDocx(currentDocument);
            });
            menu.appendChild(listItem);
        }

        Object.keys(docxOptions)
            .filter(key => !/^(className|h)$/i.test(key))
            .filter(key => typeof docxOptions[key] === 'boolean')
            .forEach(function(key) {
                addToggle(key, () => docxOptions[key], (v) => { docxOptions[key] = v; });
            });

        // Nested options for Comments.
        const commentsSeparator = document.createElement("li");
        commentsSeparator.innerHTML = '<hr class="dropdown-divider"><h6 class="dropdown-header">comments.*</h6>';
        menu.appendChild(commentsSeparator);
        for (const key of ['sidebar','highlight']) {
            addToggle(`comments.${key}`,
                () => docxOptions.comments?.[key] ?? false,
                (v) => { docxOptions.comments = { ...docxOptions.comments, [key]: v }; });
        }
        // comments.layout is a string, not a boolean — render as a radio pair.
        const layoutItem = document.createElement("li");
        layoutItem.innerHTML = `
            <div class="dropdown-item">
                <div>comments.layout</div>
                <div class="form-check form-check-inline">
                    <label><input type="radio" name="layout-mode" value="anchored"> anchored</label>
                </div>
                <div class="form-check form-check-inline">
                    <label><input type="radio" name="layout-mode" value="packed"> packed</label>
                </div>
            </div>`;
        menu.appendChild(layoutItem);
        for (const radio of layoutItem.querySelectorAll('input[name="layout-mode"]')) {
            radio.checked = (docxOptions.comments?.layout ?? 'anchored') === radio.value;
            radio.addEventListener('change', () => {
                docxOptions.comments = { ...docxOptions.comments, layout: radio.value };
                renderDocx(currentDocument);
            });
        }

        // Nested options for Track Changes (see #3, #4, #5).
        const changesSeparator = document.createElement("li");
        changesSeparator.innerHTML = '<hr class="dropdown-divider"><h6 class="dropdown-header">changes.*</h6>';
        menu.appendChild(changesSeparator);
        for (const key of ['show','showInsertions','showDeletions','showMoves','showFormatting','colorByAuthor','changeBar','legend','sidebarCards']) {
            addToggle(`changes.${key}`,
                () => docxOptions.changes?.[key] ?? false,
                (v) => { docxOptions.changes = { ...docxOptions.changes, [key]: v }; });
        }

        container.addEventListener("dragover", ev => ev.preventDefault());
        container.addEventListener("drop", ev => {
            ev.preventDefault();
            renderDocx(ev.dataTransfer.files[0]);
        });
    </script>
</body>

</html>
